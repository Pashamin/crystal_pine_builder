name: Сборка Crystal OS для Redmi 7A/8/8A

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: 1. Максимальная зачистка места на диске
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc   
       
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf /usr/local/share/powershell
        sudo rm -rf /usr/local/share/chromium
        sudo rm -rf /usr/lib/jvm

        sudo apt-get autoremove -y
        sudo apt-get clean

        docker rmi $(docker images -q) 2>/dev/null || true
        df -h

    - name: 2. Настройка пакетов и окружения Ubuntu
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: 3. Инициализация исходников Crystal OS (Глубина 1)
      run: |
        git config --global user.name "CrystalDev"
        git config --global user.email "crystal_dev@crystal.com"
        mkdir android && cd android
        repo init -u https://github.com/LineageOS/android.git -b lineage-18.1 --depth=1
        
    - name: 4. Погнали локальные репозитории (Crystal OS Manifest)
      run: |
        cd android
        mkdir -p .repo/local_manifests
        cat <<EOF > .repo/local_manifests/crystal.xml
        <?xml version="1.0" encoding="UTF-8"?>
        <manifest>
          <project name="Pashamin/android_device_xiaomi_pine" path="device/xiaomi/mi439" remote="github" revision="lineage-18.1" />
            
            <project name="mi-sdm439/android_device_xiaomi_sdm439-common" path="device/xiaomi/sdm439-common" remote="github" revision="lineage-18.1" />
            
            <project name="Pashamin/android_vendor_xiaomi_pine" path="vendor/xiaomi/mi439" remote="github" revision="lineage-18.1" />
            
            <project name="Pashamin/android_kernel_xiaomi_sdm439" path="kernel/xiaomi/sdm439" remote="github" revision="lineage-18.1" />
        </manifest>
        EOF

    - name: 5. Полная синхронизация репозиториев (Repo Sync)
      run: |
        cd android
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
        
        echo "=== Бэкапим исходники избавляясь от ссылок ==="
        # Копируем папки целиком через cp -rL. Флаг -L заставляет cp следовать по ссылкам 
        # и копировать РЕАЛЬНОЕ содержимое файлов вместо самих ссылок!
        mkdir -p /tmp/android_backup
        cp -rL device /tmp/android_backup/
        cp -rL vendor /tmp/android_backup/
        cp -rL kernel /tmp/android_backup/
        
        echo "=== Чистим .repo и старые папки ==="
        rm -rf .repo
        rm -rf device vendor kernel
        
        echo "=== Возвращаем чистые файлы на место ==="
        mv /tmp/android_backup/device .
        mv /tmp/android_backup/vendor .
        mv /tmp/android_backup/kernel .
        
        df -h

    - name: 5.1 Жесткая фиксация путей вендора
      run: |
        cd android
        
        # Проверяем, куда на самом деле скачался наш репо. 
        # Если он скачался в mi439, а система ищет в sdm439-common, делаем копию папки
        if [ -d "vendor/xiaomi/mi439" ]; then
          echo "Вендор найден в vendor/xiaomi/mi439"
          cp -r vendor/xiaomi/mi439 vendor/xiaomi/sdm439-common || true
        elif [ -d "vendor/xiaomi/sdm439-common" ]; then
          echo "Вендор найден в vendor/xiaomi/sdm439-common"
          cp -r vendor/xiaomi/sdm439-common vendor/xiaomi/mi439 || true
        fi

        # Отключаем roomservice, чтобы он не затирал наши репозитории оригинальными репозиториями LineageOS
        export DISABLE_ROOMSERVICE=true
        
    - name: 6. Проверка существования файлов в обеих папках
      run: |
        cd android
        echo "=== Содержимое vendor/xiaomi/mi439 ==="
        ls -la vendor/xiaomi/mi439 || echo "Папка mi439 не существует"
        
        echo "=== Содержимое vendor/xiaomi/sdm439-common ==="
        ls -la vendor/xiaomi/sdm439-common || echo "Папка sdm439-common не существует"

    - name: 7. Запуск компиляции прошивки (Режим экономии)
      run: |
        cd android
        source build/envsetup.sh
        lunch crystal_pine-userdebug
        export MINIMAL_APPS=true
        export WITH_SU=true
        mka bacon -j2

    - name: 8. Создание официального релиза и загрузка ZIP
      if: success()
      uses: ncipollo/release-action@v1
      with:
        # Чит-код: используем звездочку */*.zip, чтобы Гитхаб нашел архив в любой папке продукта
        artifacts: "android/out/target/product/*/*.zip"
        tag: "v1.0-mi439"
        name: "Crystal OS v1.0 для Redmi 7A/8/8A (mi439)"
        body: "Официальная сборка Crystal OS на базе Android 11. Скомпилировано автоматически через GitHub Actions."
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}
