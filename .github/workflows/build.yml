name: Сборка Crystal OS для Redmi 7A/8/8A

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: 1. Максимальная зачистка места на диске
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc   
       
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf /usr/local/share/powershell
        sudo rm -rf /usr/local/share/chromium
        sudo rm -rf /usr/lib/jvm

        sudo apt-get autoremove -y
        sudo apt-get clean

        docker rmi $(docker images -q) 2>/dev/null || true
        df -h

    - name: 2. Настройка пакетов и окружения Ubuntu
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential make curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev libncurses5 python3
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: 3. Инициализация исходников Crystal OS (Глубина 1)
      run: |
        git config --global user.name "CrystalDev"
        git config --global user.email "crystal_dev@crystal.com"
        mkdir android && cd android
        repo init -u https://github.com/LineageOS/android.git -b lineage-18.1 --depth=1
        
    - name: 4. Погнали локальные репозитории (Crystal OS Manifest)
      run: |
        cd android
        mkdir -p .repo/local_manifests
        cat <<EOF > .repo/local_manifests/crystal.xml
        <?xml version="1.0" encoding="UTF-8"?>
        <manifest>
          <project name="Pashamin/android_device_xiaomi_pine" path="device/xiaomi/mi439" remote="github" revision="lineage-18.1" />
          <project name="mi-sdm439/android_device_xiaomi_sdm439-common" path="device/xiaomi/sdm439-common" remote="github" revision="lineage-18.1" />
          <project name="Pashamin/android_kernel_xiaomi_sdm439" path="kernel/xiaomi/sdm439" remote="github" revision="lineage-18.1" />
        </manifest>
        EOF

    - name: 5. Полная синхронизация репозиториев (Repo Sync)
      run: |
        cd android
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
        
        echo "=== Освобождаем место (чистим .repo) ==="
        rm -rf .repo
        
        echo "=== Качаем вендор в mi439 ==="
        git clone --depth=1 -b lineage-18.1 https://github.com/Pashamin/android_vendor_xiaomi_pine.git vendor/xiaomi/mi439
        
        echo "=== Качаем ТОТ ЖЕ вендор в sdm439-common, чтобы пути совпали ==="
        
        git clone --depth=1 -b lineage-18.1 https://github.com/Pashamin/android_vendor_xiaomi_pine.git vendor/xiaomi/sdm439-common

    - name: 5.1 Очистка
      run: |
        cd android/vendor/xiaomi/mi439
        rm -f sdm439-common-vendor.mk BoardConfigSDM439.mk
        cp mi439-vendor.mk sdm439-common-vendor.mk
        cp BoardConfigVendor.mk BoardConfigSDM439.mk
        
        cd ../sdm439-common
        rm -f sdm439-common-vendor.mk BoardConfigSDM439.mk
        cp mi439-vendor.mk sdm439-common-vendor.mk
        cp BoardConfigVendor.mk BoardConfigSDM439.mk
        
        echo "=== Проверка структуры папки sdm439-common ==="
        ls -la
        
    - name: 6. Проверка существования файлов в обеих папках
      run: |
        cd android
        echo "=== Содержимое vendor/xiaomi/mi439 ==="
        ls -la vendor/xiaomi/mi439 || echo "Папка mi439 не существует"
        
        echo "=== Содержимое vendor/xiaomi/sdm439-common ==="
        ls -la vendor/xiaomi/sdm439-common || echo "Папка sdm439-common не существует"

    - name: 7. Запуск компиляции 
      run: |
        cd android

        echo "=== УДАЛЕНИЕ ДУБЛИКАТА АУДИО ==="
        
        rm -rf kernel/xiaomi/sdm439/techpack/audio
        
        
        if [ ! -d "kernel/xiaomi/sdm439/techpack/audio" ]; then
          echo "Успех! Старая папка аудио стерта."
        else
          echo "ВНИМАНИЕ: Папка все еще тут!"
        fi
        
        echo "=== Затыкаем все дыры в Android.bp ==="
        cat << 'EOF' > vendor/lineage/build/soong/Android.bp
        bootstrap_go_package {
            name: "soong-lineage-generator",
            pkgPath: "lineage/soong/generator",
            deps: ["blueprint", "blueprint-pathtools", "soong", "soong-android", "soong-shared"],
            srcs: ["generator/generator.go", "generator/variables.go"],
            pluginFor: ["soong_build"],
        }

        // --- БАЗОВЫЕ ---
        cc_defaults { name: "process_sdk_version_overrides_defaults" }
        cc_defaults { name: "shim_libs_defaults" }
        cc_defaults { name: "librmnetctl_pre_uplink_defaults" }
        cc_defaults { name: "bootloader_message_offset_defaults" }
        cc_defaults { name: "needs_netd_direct_connect_rule_defaults" }
        cc_defaults { name: "has_memfd_backport_defaults" }
        cc_defaults { name: "perfetto_defaults_qcom" }
        cc_defaults { name: "qti_perf_defaults" }
        cc_defaults { name: "memory_management_defaults" }
        cc_defaults { name: "cgroup_optimization_defaults" }
        cc_defaults { name: "lmkd_defaults" }
        cc_defaults { name: "libmemory_management_defaults" }

        
        cc_defaults { name: "gralloc_10_usage_bits_defaults" }
        cc_defaults { name: "legacy_hw_disk_encryption_defaults" }
        cc_defaults { name: "surfaceflinger_fod_lib_defaults" }
        cc_defaults { name: "qti_cryptfshw_qsee_defaults" }
        cc_defaults { name: "qti_power_hal_defaults" }
        cc_defaults { name: "android.hardware.power-defaults" }
        cc_defaults { name: "power_profile_defaults" }

        cc_defaults { name: "qti_snpe_defaults" }
        cc_defaults { name: "adsprpc_defaults" }
        cc_defaults { name: "qti_drm_defaults" }
        cc_defaults { name: "usb_hal_defaults" }


        // --- СЕТЕВЫЕ ПРОТОКОЛЫ И ИНТЕРНЕТ QUALCOMM ---
        cc_defaults { name: "data_qti_defaults" }
        cc_defaults { name: "qti_net_defaults" }
        cc_defaults { name: "ip_multimedia_defaults" }


        cc_defaults { name: "qcom_audio_earpiece_defaults" }
        cc_defaults { name: "audio_handset_defaults" }


        cc_defaults { name: "qti_vibrator_defaults" }
        cc_defaults { name: "android.hardware.vibrator-defaults" }

        // --- ПОДСИСТЕМА СВЕТОДИОДОВ И УВЕДОМЛЕНИЙ (LED / LIGHTS) ---
        cc_defaults { name: "qti_lights_hal_defaults" }
        cc_defaults { name: "android.hardware.lights-defaults" }


        // --- ФАЙЛЫ, ЯДРО И ПЛАНИРОВЩИКИ (И ЗАЩИТА ОТ ПЕРЕГРЕВА ТЕРМОПАСТЫ) ---
        cc_defaults { name: "qti_kernel_headers_defaults" }
        cc_defaults { name: "f2fs_tools_defaults" }
        cc_defaults { name: "sdcard_ext4_defaults" }
        cc_defaults { name: "qcom_sched_defaults" }
        cc_defaults { name: "thermal_core_settings_defaults" }


        // --- РАДИОМОДУЛИ ---
        cc_defaults { name: "qti_ims_defaults" }
        cc_defaults { name: "volte_speaker_defaults" }
        cc_defaults { name: "sms_optimization_defaults" }
        cc_defaults { name: "connectivity_coex_defaults" }
        cc_defaults { name: "bt_profile_defaults" }
        cc_defaults { name: "rmnet_data_defaults" }
        cc_defaults { name: "wifi_driver_hal_defaults" }


        // --- ПАКЕТ "ЗВУКОВАЯ ПОДСИСТЕМА: ДИНАМИКИ, МИКРО И ТРАКТЫ" ---
        cc_defaults { name: "qcom_audio_speaker_defaults" }
        cc_defaults { name: "qcom_audio_mic_defaults" }
        cc_defaults { name: "audio_route_manager_defaults" }
        cc_defaults { name: "sound_trigger_platform_defaults" }


        
        cc_defaults { name: "no_cameraserver_defaults" }
        cc_defaults { name: "qti_camera_device_defaults" }
        cc_defaults { name: "needs_camera_boottime_defaults" }
        cc_defaults { name: "camera_qti_defaults" }
        cc_defaults { name: "libcamera_metadata_defaults" }
        cc_defaults { name: "vendor_init_defaults" }

        cc_library_headers {
            name: "generated_kernel_headers",
            vendor_available: true,
            recovery_available: true,
        }

        cc_library_headers {
            name: "qti_kernel_headers",
            vendor_available: true,
            recovery_available: true,
        }

        // --- ПАКЕТ БИОМЕТРИИ ---
        cc_defaults { name: "qti_biometrics_fingerprint_defaults" }
        cc_defaults { name: "qti_biometrics_face_defaults" }
        cc_defaults { name: "android.hardware.biometrics.fingerprint-defaults" }


        // --- ПАКЕТ "НАУШНИКИ И АУДИО-КОДЕК QUALCOMM" ---
        cc_defaults { name: "qcom_audio_jack_defaults" }
        cc_defaults { name: "wcd_codec_defaults" }
        cc_defaults { name: "audio_trigger_defaults" }


        // --- ГЕОЛОКАЦИЯ И НАВИГАЦИЯ (Qualcomm GNSS / Izat) ---
        cc_defaults { name: "qti_location_defaults" }
        cc_defaults { name: "location_hal_defaults" }
        cc_defaults { name: "android.hardware.gnss-defaults" }


        cc_defaults { name: "disable_postrender_cleanup_defaults" }
        cc_defaults { name: "surfaceflinger_qcom_ext_defaults" }


        // --- ПАКЕТ "ДИСПЛЕЙ И ОПТИМИЗАЦИЯ ЭКРАНА QUALCOMM" ---
        cc_defaults { name: "display_settings_defaults" }
        cc_defaults { name: "qti_display_enhancements_defaults" }
        cc_defaults { name: "snpe_display_defaults" }


        // --- ПАКЕТ "ФИЗИЧЕСКИЕ КНОПКИ И ПРЕРЫВАНИЯ" ---
        cc_defaults { name: "gpio_keys_defaults" }
        cc_defaults { name: "input_hal_defaults" }
        cc_defaults { name: "keymaster_input_defaults" }

        
        cc_defaults { name: "audio_qti_defaults" }
        cc_defaults { name: "display_intf_defaults" }
        cc_defaults { name: "thermal_engine_defaults" }
        cc_defaults { name: "perf_hal_defaults" }
        cc_defaults { name: "bt_qcom_defaults" }
        cc_defaults { name: "wifi_hal_defaults" }
        cc_defaults { name: "nfc_nci_defaults" }
        cc_defaults { name: "ril_defaults" }
        cc_defaults { name: "sensors_hal_defaults" }
        cc_defaults { name: "camera_flashlight_defaults" }
        cc_defaults { name: "stagefright_qcom_legacy_defaults" }
        cc_defaults { name: "camera_in_mediaserver_defaults" }
        cc_defaults { name: "extended_compress_format_defaults" }
        cc_defaults { name: "camera_parameter_library_defaults" }
        cc_defaults { name: "nvidia_enhancements_defaults" }
        cc_defaults { name: "vold_hw_fde_defaults" }
        cc_defaults { name: "vold_hw_fde_perf_defaults" }
        EOF
        
        echo "=== Инициализация и запуск ==="
        export MINIMAL_APPS=true
        export WITH_SU=true
        export ALLOW_MISSING_DEPENDENCIES=true


        echo "=== ФИКС ЯДРА ==="
        cd kernel/xiaomi/sdm439
        
        mkdir -p arch/arm64/configs
        mkdir -p arch/arm/configs
        mkdir -p arch/configs
        

        cp arch/arm64/configs/msm8937-perf_defconfig arch/arm64/configs/mi439-perf_defconfig
        cp arch/arm64/configs/msm8937-perf_defconfig arch/arm/configs/mi439-perf_defconfig
        cp arch/arm64/configs/msm8937-perf_defconfig arch/configs/mi439-perf_defconfig
        
        cd ../../../


        echo "=== ОТКЛЮЧАЕМ СЛОМАННУЮ КАМЕРУ ИЗ СБОРКИ ==="
        cd device/xiaomi/sdm439-common/camera/QCamera2
        if [ -f "Android.mk" ]; then
          mv Android.mk Android.mk.bak
        fi
        cd ../../../../../



        echo "=== ФИКС MAKE ==="

        echo "MAKE=make" >> $GITHUB_ENV
        echo "TARGET_KERNEL_MAKE_ENV=MAKE=make" >> $GITHUB_ENV


        export TARGET_KERNEL_MAKE_ENV="MAKE=make"



        echo "=== СТАРТ СБОРКИ ==="
        echo "=== ВТОРОЙ ФИКС MAKE ==="

        mkdir -p /tmp/make-hack
        

        cp /usr/bin/make /tmp/make-hack/-C
        chmod +x /tmp/make-hack/-C
        

        export PATH=/tmp/make-hack:$PATH
        echo "/tmp/make-hack" >> $GITHUB_PATH
        source build/envsetup.sh
        lunch crystal_pine-userdebug
        
        export MAKE=make
        export KBUILD_BUILD_USER=crystal
        export KBUILD_BUILD_HOST=test-build
        
        TARGET_KERNEL_ARCH=arm64 ARCH=arm64 KERNEL_ARCH=arm64 mka bacon -j2
        mka bacon -j2

    - name: 8. Создание официального релиза и загрузка ZIP
      if: success()
      uses: ncipollo/release-action@v1
      with:
        artifacts: "android/out/target/product/pine/*.zip"
        tag: "v1.0-mi439"
        name: "Crystal OS v1.0 для Redmi 7A/8/8A (mi439)"
        body: |
          ### Crystal OS v1.0 — Официальный тестовый билд
          * **Платформа:** Redmi 7A / 8 / 8A (`mi439` / `pine`)
          * **База:** Android 11 (LineageOS 18.1)
          * Скомпилировано автоматически через GitHub Actions.

          ⚠️ **ВНИМАНИЕ!** ЭТО ТЕСТОВАЯ ВЕРСИЯ (НЕ РЕКОМЕНДУЕТСЯ ДЛЯ УСТАНОВКИ, ПРЕДНАЗНАЧЕНА ДЛЯ РАЗРАБОТЧИКОВ И ТЕСТОВ).
          
          **Известные проблемы:**
          * ❌ Не работает камера (отсутствуют 32-bit проприетарные библиотеки вендора).
        allowUpdates: true
        omitBodyDuringUpdate: false
        omitNameDuringUpdate: false
        token: ${{ secrets.GITHUB_TOKEN }}
