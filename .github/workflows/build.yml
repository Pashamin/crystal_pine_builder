name: Сборка Crystal OS для Redmi 7A/8/8A

on:
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: 1. Максимальная зачистка места на диске
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get clean
        docker rmi $(docker images -q) 2>/dev/null || true
        df -h

    - name: 2. Настройка пакетов и окружения Ubuntu
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.1-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: 3. Инициализация исходников Crystal OS (Глубина 1)
      run: |
        git config --global user.name "Pavel"
        git config --global user.email "fakeaccountpashi@gmail.com"
        mkdir android && cd android
        repo init -u https://github.com/LineageOS/android.git -b lineage-18.1 --depth=1
        
    - name: 4. Скачивание дерева устройств, вендора и ядра
      run: |
        cd android
        # Выкачиваем всё, что мы с трудом нашли в Колабе
        git clone --depth=1 -b lineage-18.1 https://github.com/mi-sdm439/android_device_xiaomi_mi439.git device/xiaomi/mi439
        git clone --depth=1 -b lineage-18.1 https://github.com/mi-sdm439/android_device_xiaomi_sdm439-common.git device/xiaomi/sdm439-common
        git clone --depth=1 -b lineage-18.1 https://github.com/mi-sdm439/android_vendor_xiaomi_mi439.git vendor/xiaomi/mi439
        git clone --depth=1 -b lineage-18.1 https://github.com/mi-sdm439/android_kernel_xiaomi_sdm439.git kernel/xiaomi/sdm439

    - name: 5. Синхронизация репозиториев (Repo Sync)
      run: |
        cd android
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: 6. Запуск компиляции прошивки (Режим экономии)
      run: |
        cd android
        source build/envsetup.sh
        lunch crystal_pine-userdebug
        export MINIMAL_APPS=true
        export WITH_SU=true
        # Собираем в 2 потока, чтобы не лопнул диск от кэша
        mka bacon -j2

    - name: 7. Загрузка готовой прошивки на файлообменник
      if: success()
      run: |
        cd android/out/target/product/pine/
        # Берем готовый zip и заливаем его на бесплатный bashupload (или аналог)
        echo "Загрузка прошивки в облако..."
        curl https://bashupload.com/ -T CrystalOS*.zip > download_link.txt
        echo "Ваша ссылка на прошивку:"
        cat download_link.txt
