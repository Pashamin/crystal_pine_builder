name: Сборка Crystal OS для Redmi 7A/8/8A

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: 1. Максимальная зачистка места на диске
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc   
       
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf /usr/local/share/powershell
        sudo rm -rf /usr/local/share/chromium
        sudo rm -rf /usr/lib/jvm

        sudo apt-get autoremove -y
        sudo apt-get clean

        docker rmi $(docker images -q) 2>/dev/null || true
        df -h

    - name: 2. Настройка пакетов и окружения Ubuntu
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: 3. Инициализация исходников Crystal OS (Глубина 1)
      run: |
        git config --global user.name "CrystalDev"
        git config --global user.email "crystal_dev@crystal.com"
        mkdir android && cd android
        repo init -u https://github.com/LineageOS/android.git -b lineage-18.1 --depth=1
        
    - name: 4. Погнали локальные репозитории (Crystal OS Manifest)
      run: |
        cd android
        mkdir -p .repo/local_manifests
        cat <<EOF > .repo/local_manifests/crystal.xml
        <?xml version="1.0" encoding="UTF-8"?>
        <manifest>
          <project name="Pashamin/android_device_xiaomi_pine" path="device/xiaomi/mi439" remote="github" revision="lineage-18.1" />
          <project name="mi-sdm439/android_device_xiaomi_sdm439-common" path="device/xiaomi/sdm439-common" remote="github" revision="lineage-18.1" />
          <project name="Pashamin/android_kernel_xiaomi_sdm439" path="kernel/xiaomi/sdm439" remote="github" revision="lineage-18.1" />
        </manifest>
        EOF

    - name: 5. Полная синхронизация репозиториев (Repo Sync)
      run: |
        cd android
        
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
        
        echo "=== Освобождаем место (чистим .repo) ==="
        rm -rf .repo
        
        echo "=== Качаем вендор чистыми файлами ==="
        
        git clone --depth=1 -b lineage-18.1 https://github.com/Pashamin/android_vendor_xiaomi_pine.git vendor/xiaomi/mi439
        
        echo "=== Дублируем для совместимости путей ==="
        
        cp -r vendor/xiaomi/mi439 vendor/xiaomi/sdm439-common
        
        df -h

    - name: 5.1 Очистка
      run: |
        cd android/vendor/xiaomi/mi439
        
       
        rm -f sdm439-common-vendor.mk
        rm -f BoardConfigSDM439.mk
        
        
        cp mi439-vendor.mk sdm439-common-vendor.mk
        cp BoardConfigVendor.mk BoardConfigSDM439.mk
        
        
        cd ..
        rm -rf sdm439-common
        cp -r mi439 sdm439-common
        
        echo "=== ПРОВЕРКА ПОСЛЕ ФИКСА ==="
        ls -la sdm439-common/
        
    - name: 6. Проверка существования файлов в обеих папках
      run: |
        cd android
        echo "=== Содержимое vendor/xiaomi/mi439 ==="
        ls -la vendor/xiaomi/mi439 || echo "Папка mi439 не существует"
        
        echo "=== Содержимое vendor/xiaomi/sdm439-common ==="
        ls -la vendor/xiaomi/sdm439-common || echo "Папка sdm439-common не существует"

    - name: 7. Запуск компиляции (Ультимативный Shield v2.0)
      run: |
        cd android
        
        echo "=== Затыкаем все дыры в Android.bp ==="
        cat << 'EOF' > vendor/lineage/build/soong/Android.bp
        bootstrap_go_package {
            name: "soong-lineage-generator",
            pkgPath: "lineage/soong/generator",
            deps: ["blueprint", "blueprint-pathtools", "soong", "soong-android", "soong-shared"],
            srcs: ["generator/generator.go", "generator/variables.go"],
            pluginFor: ["soong_build"],
        }

        // --- БАЗОВЫЕ ---
        cc_defaults { name: "process_sdk_version_overrides_defaults" }
        cc_defaults { name: "shim_libs_defaults" }
        cc_defaults { name: "librmnetctl_pre_uplink_defaults" }
        cc_defaults { name: "bootloader_message_offset_defaults" }

        // --- ТО, ЧТО ОН ПРОСИЛ (Фиксы ошибок) ---
        cc_defaults { name: "gralloc_10_usage_bits_defaults" }
        cc_defaults { name: "legacy_hw_disk_encryption_defaults" }
        cc_defaults { name: "surfaceflinger_fod_lib_defaults" }
        cc_defaults { name: "qti_cryptfshw_qsee_defaults" }

        // --- ПРЕВЕНТИВНЫЙ УДАР (Чтобы не спрашивал позже) ---
        cc_defaults { name: "audio_qti_defaults" }
        cc_defaults { name: "display_intf_defaults" }
        cc_defaults { name: "thermal_engine_defaults" }
        cc_defaults { name: "perf_hal_defaults" }
        cc_defaults { name: "bt_qcom_defaults" }
        cc_defaults { name: "wifi_hal_defaults" }
        cc_defaults { name: "nfc_nci_defaults" }
        cc_defaults { name: "ril_defaults" }
        cc_defaults { name: "sensors_hal_defaults" }
        cc_defaults { name: "camera_flashlight_defaults" }
        EOF
        
        echo "=== Инициализация и запуск ==="
        export MINIMAL_APPS=true
        export WITH_SU=true
        
        source build/envsetup.sh
        lunch crystal_pine-userdebug
        
        mka bacon -j1

    - name: 8. Создание официального релиза и загрузка ZIP
      if: success()
      uses: ncipollo/release-action@v1
      with:
        
        artifacts: "android/out/target/product/*/*.zip"
        tag: "v1.0-mi439"
        name: "Crystal OS v1.0 для Redmi 7A/8/8A (mi439)"
        body: "Официальная сборка Crystal OS на базе Android 11. Скомпилировано автоматически через GitHub Actions."
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}
